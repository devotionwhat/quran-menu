<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTube Kids · Fullscreen Player</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET & BASE ========== */
    *, *::after, *::before { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background-color: #000;
      font-family: "Montserrat", sans-serif;
      overflow: hidden;
    }

    .app {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ddd;
    }

    /* ========== MAIN UI (phone screen) ========== */
    .screen {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      background-color: #F9F9F9;
      border-radius: 0;
      padding: 12px;
      overflow: hidden;
    }
    @media (min-width: 500px) {
      .screen {
        max-width: 420px;
        max-height: 800px;
        border-radius: 25px;
        box-shadow: 0px 0px 10px 2px rgba(140,140,140,0.15);
      }
    }

    .icon {
      object-fit: contain; height: 25px;
      opacity: 0.5;
      filter: grayscale(100%); cursor: pointer; transition: 0.4s ease;
    }
    .icon:hover { filter: grayscale(0%); opacity: 1; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%;
      height: 60px; flex-shrink: 0;
    }
    .header__logo { display: flex; align-items: center; }
    .header__icon { height: 25px; object-fit: cover; margin-right: 5px; }
    .header__title { font-size: 18px; }

    .categories {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; height: 60px; flex-shrink: 0;
    }
    .categories__link {
      position: relative; font-size: 10px;
      padding: 6px 16px;
      border-radius: 16px; border: 1px solid #E8003C; color: #E8003C;
      cursor: pointer; overflow: hidden;
    }
    .categories__link:hover { color: #ffffff; }
    .categories__text { position: relative; z-index: 10; }

    .video {
      flex: 1;
      overflow-y: auto;
      width: 100%;
      padding-right: 2px;
      min-height: 0;
    }

    /* ========== DYNAMIC GRID ========== */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 2 Columns like the photo */
      grid-column-gap: 12px;
      grid-row-gap: 20px;
      width: 100%;
      padding-bottom: 20px;
    }

    .video__item {
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }

    .thumb-con {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      border-radius: 12px; /* Rounded corners for thumbnails */
      background-color: #111;
    }

    .thumb {
      background-size: cover;
      background-position: center;
      height: 100%;
      width: 100%;
    }

    .video__info {
      padding: 8px 4px 0;
    }

    .video__title {
      font-size: 13px;
      font-weight: 700;
      color: #000;
      line-height: 1.4;
      margin-bottom: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video__channel {
      font-size: 10px;
      color: #606060;
      font-weight: 400;
    }

    .play-button {
      position: absolute;
      width: 30px; height: 30px;
      background-color: transparent;
      top: 50%; left: 48%;
      transform: translate(-50%, -50%) rotate(45deg);
      border-top: 4px solid white;
      border-right: 4px solid white;
      filter: drop-shadow(0 0 5px rgba(0,0,0,0.4));
    }

    /* ========== NAVIGATION MENU ========== */
    .menu {
      width: 100%; background-color: #ffffff; border-radius: 20px;
      box-shadow: 0px 0px 5px 1px rgba(140,140,140,0.15);
      padding: 10px 14px; margin-top: 8px; flex-shrink: 0;
    }
    .menu__list { display: flex; justify-content: space-between; list-style: none; }
    .menu__link { display: flex; flex-direction: column; align-items: center; text-decoration: none; }
    .menu__icon { height: 20px; object-fit: contain; }
    .menu__txt { color: #8c8c8c; font-size: 8px; font-weight: bold; margin-top: 4px; }

    /* ========== PLAYER CONTAINER ========== */
    #playerContainer {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: #000;
      z-index: 1000;
      display: none;
    }
    #youtube-player { width: 100%; height: 100%; border: none; }
    .back-btn {
      position: absolute; top: 20px; left: 20px; z-index: 1010;
      background: rgba(0,0,0,0.6); color: white; border: none;
      padding: 10px 15px; border-radius: 50px; font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="screen">
      <header class="header">
        <img class="header__menu icon" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDgiIGhlaWdodD0iNDgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGc+PHBhdGggZmlsbD0iI2U4MDAzYyIgZD0ibTYsMzZsMTIsMGwwLC00bC0xMiwwbDAsNHptMCwtMjRsMCw0bDM2LDBsMCwtNGwtMzYsMHptMCwxNGwyNCwwbDAsLTRsLTI0LDBsMCw0eiIvPjwvZz48L3N2Zz4=">
        <div class="header__logo">
          <h1 class="header__title" style="color:#FF0000; font-weight:800;">YouTube</h1>
        </div>
        <img class="header__search icon" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDgiIGhlaWdodD0iNDgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGc+PHBhdGggZmlsbD0iI2U4MDAzYyIgZD0ibTMxLDI4bC0xLjU5LDBsLTAuNTUsLTAuNTVjMS45NiwtMi4yNyAzLjE0LC01LjIyIDMuMTQsLTguNDVjMCwtNy4xOCAtNS44MiwtMTMgLTEzLC0xM3MtMTMsNS44MiAtMTMsMTNzNS44MiwxMyAxMywxM2MzLjIzLDAgNi4xOCwtMS4xOCA4LjQ1LC0zLjEzbDAuNTUsMC41NWwwLDEuNThsMTAsOS45OGwyLjk4LC0yLjk4bC05Ljk4LC0xMHptLTEyLDBjLTQuOTcsMCAtOSwtNC4wMyAtOSwtOXM0LjAzLC05IDksLTlzOSw0LjAzIDksOXMtNC4wMyw5IC05LDl6Ii8+PC9nPjwvc3ZnPg==">
      </header>

      <div class="categories">
        <a class="categories__link btn-home"><span class="categories__text">الرئيسية</span></a>
        <a class="categories__link btn-mecca"><span class="categories__text">مكة والمدينة</span></a>
        <a class="categories__link btn-shaarawy"><span class="categories__text">الشعراوي</span></a>
      </div>

      <div class="video" id="mainVideoContainer">
        </div>

      <nav class="menu">
        <ul class="menu__list">
          <li class="menu__item"><a class="menu__link btn-home"><img class="menu__icon icon" src="https://cdn-icons-png.flaticon.com/512/1946/1946488.png"><span class="menu__txt">Home</span></a></li>
          <li class="menu__item"><a class="menu__link btn-mecca"><img class="menu__icon icon" src="https://cdn-icons-png.flaticon.com/512/1055/1055644.png"><span class="menu__txt">Live</span></a></li>
          <li class="menu__item"><a class="menu__link btn-shaarawy"><img class="menu__icon icon" src="https://cdn-icons-png.flaticon.com/512/2662/2662503.png"><span class="menu__txt">Quran</span></a></li>
        </ul>
      </nav>
    </div>
  </div>

  <div id="playerContainer">
    <button class="back-btn" onclick="closePlayer()">✕ Close</button>
    <div id="youtube-player"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const homeLinks = ["https://youtu.be/dQw4w9WgXcQ", "https://youtu.be/3JZ_D3ELwOQ"];
    const trendingLinks = ["https://youtu.be/9bZkp7q19f0"];
    const quranLinks = ["https://youtu.be/CevxZvSJLk8"];

    function regexYTLink(url) {
      const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
      const match = url.match(regExp);
      return (match && match[2].length === 11) ? match[2] : null;
    }

    const homeVideos = homeLinks.map((l, i) => ({ id: regexYTLink(l), title: "Amazing Nature Scenes " + (i+1) }));
    const trendingVideos = trendingLinks.map((l, i) => ({ id: regexYTLink(l), title: "Trending Video " + (i+1) }));
    const quranVideos = quranLinks.map((l, i) => ({ id: regexYTLink(l), title: "القرآن الكريم - مقطع " + (i+1) }));

    function loadGrid(videoList) {
      const container = document.getElementById('mainVideoContainer');
      const grid = document.createElement('div');
      grid.className = 'video-grid';

      videoList.forEach(v => {
        const item = document.createElement('div');
        item.className = 'video__item';
        item.innerHTML = `
          <div class="thumb-con">
            <div class="thumb" style="background-image: url('https://img.youtube.com/vi/${v.id}/mqdefault.jpg')"></div>
            <div class="play-button"></div>
          </div>
          <div class="video__info">
            <h2 class="video__title">${v.title}</h2>
            <h3 class="video__channel">YouTube Kids • 1.2M views</h3>
          </div>
        `;
        item.onclick = () => openPlayer(v.id);
        grid.appendChild(item);
      });
      container.innerHTML = '';
      container.appendChild(grid);
    }

    let player;
    function openPlayer(id) {
      document.getElementById('playerContainer').style.display = 'block';
      if (player) {
        player.loadVideoById(id);
      } else {
        player = new YT.Player('youtube-player', { videoId: id, playerVars: { autoplay: 1 } });
      }
    }

    function closePlayer() {
      document.getElementById('playerContainer').style.display = 'none';
      if (player) player.stopVideo();
    }

    // Setup tab listeners
    document.querySelectorAll('.btn-home').forEach(b => b.onclick = () => loadGrid(homeVideos));
    document.querySelectorAll('.btn-mecca').forEach(b => b.onclick = () => loadGrid(trendingVideos));
    document.querySelectorAll('.btn-shaarawy').forEach(b => b.onclick = () => loadGrid(quranVideos));

    window.onload = () => loadGrid(homeVideos);
  </script>
</body>
</html>
