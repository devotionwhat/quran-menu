<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTube Kids · Fullscreen Player</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET & BASE ========== */
    *, *::after, *::before { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background-color: #000;
      font-family: "Montserrat", sans-serif;
      overflow: hidden;
    }

    .app {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #ddd;
    }

    /* ========== MAIN UI (phone screen) ========== */
    .screen {
      display: flex; flex-direction: column;
      width: 100%; height: 100%;
      background-color: #F9F9F9;
      border-radius: 0;
      padding: 12px;
      overflow: hidden;
    }
    @media (min-width: 500px) {
      .screen {
        max-width: 420px; max-height: 800px;
        border-radius: 25px;
        box-shadow: 0px 0px 10px 2px rgba(140,140,140,0.15);
      }
    }

    .icon {
      object-fit: contain; height: 25px; opacity: 0.5;
      filter: grayscale(100%); cursor: pointer; transition: 0.4s ease;
    }
    .icon:hover { filter: grayscale(0%); opacity: 1; }

    .header {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; height: 60px; flex-shrink: 0;
    }
    .header__logo { display: flex; align-items: center; }
    .header__icon { height: 25px; object-fit: cover; margin-right: 5px; }
    .header__title { font-size: 18px; }

    .categories {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; height: 60px; flex-shrink: 0;
    }
    .categories__link {
      position: relative; font-size: 10px; padding: 6px 16px;
      border-radius: 16px; border: 1px solid #E8003C; color: #E8003C;
      cursor: pointer; overflow: hidden;
    }
    .categories__link::before {
      content: ""; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%; background: #E8003C; transition: 0.4s ease;
    }
    .categories__link:hover { color: #ffffff; }
    .categories__link:hover::before { left: 0%; }
    .categories__text { position: relative; z-index: 10; }

    .video {
      flex: 1;
      overflow-y: auto;
      width: 100%;
      padding-right: 2px;
      min-height: 0;
      position: relative;
    }

    /* static items (will be replaced) */
    .video__item {
      position: relative; width: 100%; margin-bottom: 10px;
    }
    .video__img {
      height: 165px; width: 100%; border-radius: 10px; object-fit: cover;
    }
    .video__stats {
      position: absolute; top: 0; height: 165px; width: 100%; cursor: pointer;
    }
    .video__views {
      position: absolute; top: 10px; left: 10px; font-size: 9px;
      padding: 2px 10px; border-radius: 12px; color: #ffffff;
      background-color: #E8003C;
    }
    .video__options {
      position: absolute; top: 10px; right: 10px;
    }
    .video__duration {
      position: absolute; bottom: 10px; right: 10px; font-size: 8px;
      padding: 2px 6px; border-radius: 6px; color: #ffffff;
      background-color: #8c8c8c;
    }
    .video__info {
      display: flex; margin: 5px 0 10px;
    }
    .video__photo {
      object-fit: cover; height: 30px; width: 30px; border-radius: 50%;
      margin-right: 5px; cursor: pointer;
    }
    .video__title { font-size: 12px; }
    .video__channel { font-size: 9px; line-height: 1.8; opacity: 0.9; }

    .menu {
      width: 100%; background-color: #ffffff; border-radius: 20px;
      box-shadow: 0px 0px 5px 1px rgba(140,140,140,0.15);
      padding: 10px 14px; margin-top: 8px; flex-shrink: 0;
    }
    .menu__list { display: flex; justify-content: space-between; }
    .menu__link {
      display: flex; flex-direction: column; justify-content: center; height: 100%;
    }
    .menu__link:hover .menu__icon { filter: grayscale(0%); opacity: 1; }
    .menu__link:hover .menu__txt { color: #E8003C; }
    .menu__icon { height: 20px; object-fit: contain; }
    .menu__txt {
      color: #8c8c8c; font-size: 8px; transition: 0.4s ease; font-weight: bold;
    }

    /* ========== VIDEO GRID – LARGER THUMBNAILS ========== */
    .video-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      padding: 0 0 12px;
    }

    .video-card {
      display: flex;
      flex-direction: column;
      width: 100%;
      cursor: pointer;
    }

    .thumb-con {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      background-color: #111;
    }

    .thumb {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-color: #222; /* fallback */
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(45deg);
      width: 48px;
      height: 48px;
      border-top: 8px solid white;
      border-right: 8px solid white;
      filter: drop-shadow(0 0 5px rgba(0,0,0,0.4));
      transition: 150ms ease-in-out;
      opacity: 0.9;
      pointer-events: none;
    }
    .thumb-con:hover .play-button { border-color: #ccc; }

    .video-info {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
    }

    .video-title {
      font-size: 16px;
      font-weight: 600;
      color: #0f0f0f;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .video-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #606060;
    }

    .video-channel {
      font-weight: 500;
    }

    .video-duration {
      background-color: rgba(0,0,0,0.7);
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      position: absolute;
      bottom: 8px;
      right: 8px;
      pointer-events: none;
    }

    /* Loading indicator */
    .loading-spinner {
      text-align: center;
      padding: 20px;
      color: #E8003C;
      font-size: 14px;
    }

    /* ========== FULLSCREEN PLAYER ========== */
    #playerContainer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-color: #000;
      z-index: 1000;
      display: none;
      color: white;
      font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #playerContainer .main-container {
      position: relative; width: 100%; height: 100%;
    }
    #playerContainer #youtube-player {
      width: 100%; height: 100%;
    }
    #playerContainer #ui-trigger {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 5; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #playerContainer #status-icon {
      font-size: 60px;
      background: rgba(0,0,0,0.5);
      width: 100px; height: 100px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      transform: scale(0.5);
    }
    #playerContainer #status-icon.show { opacity: 1; transform: scale(1); }

    #playerContainer #video-ui {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; display: flex; flex-direction: column;
      justify-content: space-between; padding: 20px; box-sizing: border-box;
      background: rgba(0, 0, 0, 0.4); z-index: 10;
      transition: opacity 0.4s ease, visibility 0.4s;
    }
    #playerContainer .hidden-ui { opacity: 0; visibility: hidden; }

    #playerContainer .top-bar {
      display: flex; align-items: center; gap: 15px; pointer-events: auto;
    }
    #playerContainer .back-btn {
      font-size: 28px; cursor: pointer; background: none; border: none; color: white;
    }
    #playerContainer .video-title { font-size: 18px; font-weight: bold; margin: 0; }
    #playerContainer .sub-btn {
      background: #FF0000; color: white; border: none; padding: 8px 16px;
      border-radius: 20px; font-weight: bold;
    }

    #playerContainer .bottom-section {
      pointer-events: auto; display: flex; flex-direction: column; gap: 15px;
    }
    #playerContainer .carousel-section {
      width: 100%; display: flex; align-items: center; overflow-x: auto;
      gap: 15px; scrollbar-width: none; -webkit-overflow-scrolling: touch;
      padding: 4px 0; /* space for active border */
    }
    #playerContainer .carousel-section::-webkit-scrollbar { display: none; }

    #playerContainer .thumb-card {
      flex: 0 0 auto; width: 180px; height: 100px; border-radius: 12px;
      overflow: hidden; cursor: pointer; border: 4px solid transparent;
      background-color: #222;
    }
    #playerContainer .thumb-card.active { border-color: #FF0000; }
    #playerContainer .thumb-card img {
      width: 100%; height: 100%; object-fit: cover;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #playerContainer .thumb-card img.loaded { opacity: 1; }

    #playerContainer .progress-row {
      width: 100%; display: flex; align-items: center; gap: 15px;
    }
    #playerContainer .progress-container {
      flex-grow: 1; height: 40px;
      display: flex; align-items: center; cursor: pointer; position: relative;
      touch-action: none;
    }
    #playerContainer .progress-bg {
      width: 100%; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px;
    }
    #playerContainer .progress-fill {
      width: 0%; height: 100%; background: #FF0000; border-radius: 3px;
    }
    #playerContainer .progress-knob {
      width: 24px; height: 24px; background: white; border-radius: 50%;
      position: absolute; left: 0%; transform: translateX(-50%);
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }
  </style>
</head>

    // Helper to extract video ID
    function getVideoId(url) {
      const match = url.match(/[?&]v=([^&]+)/);
      return match ? match[1] : null;
    }

    // ---------- LAZY LOADING SETUP (main grid) ----------
    const imageObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const thumb = entry.target;
          const videoId = thumb.dataset.id;
          if (videoId && !thumb.style.backgroundImage) {
            thumb.style.backgroundImage = `url('https://i.ytimg.com/vi/${videoId}/mqdefault.jpg')`;
          }
          imageObserver.unobserve(thumb);
        }
      });
    }, { rootMargin: '200px' });

    const carouselImageObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const img = entry.target;
          const videoId = img.dataset.id;
          if (videoId && !img.src) {
            img.src = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
            img.onload = () => img.classList.add('loaded');
          }
          carouselImageObserver.unobserve(img);
        }
      });
    }, { rootMargin: '200px' });

    // ---------- INFINITE SCROLL FOR MAIN GRID (simple version – works) ----------
    const BATCH_SIZE = 10;
    let currentRawList = [];          // raw URLs for the current category
    let currentIndex = 0;
    let isLoading = false;
    let allVideosLoaded = false;
    const videoContainer = document.getElementById('mainVideoContainer');
    const scrollContainer = document.querySelector('.video');

    function loadNextBatch() {
      if (isLoading || allVideosLoaded || !currentRawList.length) return;
      isLoading = true;
      const nextUrls = currentRawList.slice(currentIndex, currentIndex + BATCH_SIZE);
      if (nextUrls.length === 0) {
        allVideosLoaded = true;
        isLoading = false;
        return;
      }
      const nextVideos = nextUrls.map((url, i) => {
        const id = getVideoId(url);
        return id ? { id, title: `Video ${currentIndex + i + 1}` } : null;
      }).filter(v => v !== null);
      appendVideosToGrid(nextVideos);
      currentIndex += nextUrls.length;
      if (currentIndex >= currentRawList.length) allVideosLoaded = true;
      isLoading = false;
    }

    function appendVideosToGrid(videos) {
      const gridDiv = document.querySelector('.video-grid') || document.createElement('div');
      if (!gridDiv.classList.contains('video-grid')) {
        gridDiv.className = 'video-grid';
        videoContainer.innerHTML = '';
        videoContainer.appendChild(gridDiv);
      }

      videos.forEach(v => {
        const card = document.createElement('div');
        card.className = 'video-card';

        const thumbCon = document.createElement('div');
        thumbCon.className = 'thumb-con';
        const thumbDiv = document.createElement('div');
        thumbDiv.className = 'thumb';
        thumbDiv.dataset.id = v.id;
        thumbCon.appendChild(thumbDiv);
        
        const playButton = document.createElement('div');
        playButton.className = 'play-button';
        thumbCon.appendChild(playButton);
        
        const durationSpan = document.createElement('span');
        durationSpan.className = 'video-duration';
        durationSpan.textContent = '0:00'; // Requires YouTube Data API for actual duration
        thumbCon.appendChild(durationSpan);

        const infoDiv = document.createElement('div');
        infoDiv.className = 'video-info';
        infoDiv.innerHTML = `
          <div class="video-title">${v.title}</div>
          <div class="video-meta">
            <span class="video-channel">YouTube</span>
          </div>
        `;

        card.appendChild(thumbCon);
        card.appendChild(infoDiv);

        card.addEventListener('click', (e) => {
          e.preventDefault();
          openPlayerWithVideo(v.id, v.title);
        });

        gridDiv.appendChild(card);
        
        imageObserver.observe(thumbDiv);
      });
    }

    function resetGrid(newRawList) {
      currentRawList = newRawList;
      currentIndex = 0;
      allVideosLoaded = false;
      videoContainer.innerHTML = '';
      const gridDiv = document.createElement('div');
      gridDiv.className = 'video-grid';
      videoContainer.appendChild(gridDiv);
      loadNextBatch(); // direct call, no setTimeout
    }

    function onScroll() {
      if (allVideosLoaded || isLoading) return;
      const scrollEl = scrollContainer;
      if (!scrollEl) return;
      const scrollTop = scrollEl.scrollTop;
      const scrollHeight = scrollEl.scrollHeight;
      const clientHeight = scrollEl.clientHeight;
      if (scrollTop + clientHeight >= scrollHeight - 200) {
        loadNextBatch();
      }
    }

    scrollContainer.addEventListener('scroll', onScroll, { passive: true });

    // ---------- PLAYER GLOBAL VARIABLES ----------
    let player;
    let isUIVisible = true;
    let isDragging = false;
    let hideTimer;
    let masterVideoIds = [];           // array of unique video IDs (built lazily)
    const uiElement = document.getElementById('video-ui');
    const statusIcon = document.getElementById('status-icon');
    const progressFill = document.getElementById('progressFill');
    const progressKnob = document.getElementById('progressKnob');
    const progressContainer = document.getElementById('progressContainer');
    const playerContainer = document.getElementById('playerContainer');
    const displayTitle = document.getElementById('displayTitle');
    const carousel = document.getElementById('playerCarousel');

    // Carousel lazy loading
    const CAROUSEL_BATCH = 20;
    let carouselStart = 0;
    let carouselAllLoaded = false;
    let currentActiveId = null;

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('youtube-player', {
        videoId: '',
        playerVars: { autoplay: 1, controls: 0, modestbranding: 1, rel: 0, iv_load_policy: 3, playsinline: 1 },
        events: { onReady: onPlayerReady }
      });
    };

    function onPlayerReady() {
      setInterval(updateProgressBar, 100);
      startHideTimer();
    }

    function startHideTimer() {
      clearTimeout(hideTimer);
      if (isUIVisible && !isDragging && player && player.getPlayerState() === 1) {
        hideTimer = setTimeout(() => hideUI(), 5000);
      }
    }

    function resetHideTimer() {
      if (!isUIVisible) showUI();
      else startHideTimer();
    }

    function hideUI() {
      isUIVisible = false;
      uiElement.classList.add('hidden-ui');
    }

    function showUI() {
      isUIVisible = true;
      uiElement.classList.remove('hidden-ui');
      startHideTimer();
    }

    window.handleMainClick = function() {
      if (isDragging) return;
      if (!isUIVisible) showUI();
      else {
        const state = player.getPlayerState();
        if (state === 1) { player.pauseVideo(); showStatusIcon('Ⅱ'); clearTimeout(hideTimer); }
        else { player.playVideo(); showStatusIcon('▶'); hideUI(); }
      }
    };

    function showStatusIcon(char) {
      statusIcon.innerText = char;
      statusIcon.classList.add('show');
      setTimeout(() => statusIcon.classList.remove('show'), 600);
    }

    function updateProgressBar() {
      if (player && player.getCurrentTime && !isDragging) {
        const current = player.getCurrentTime();
        const total = player.getDuration();
        if (total > 0) {
          const pct = (current / total) * 100;
          setBarPosition(pct);
          document.getElementById('currentTime').innerText = formatTime(current);
          document.getElementById('totalTime').innerText = formatTime(total);
        }
      }
    }
    function setBarPosition(pct) {
      pct = Math.max(0, Math.min(100, pct));
      progressFill.style.width = pct + '%';
      progressKnob.style.left = pct + '%';
    }
    function formatTime(seconds) {
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return min + ":" + (sec < 10 ? '0' : '') + sec;
    }

    progressContainer.addEventListener('touchstart', (e) => { isDragging = true; handleScrub(e); });
    window.addEventListener('touchmove', (e) => { if (isDragging) handleScrub(e); }, { passive: false });
    window.addEventListener('touchend', () => {
      if (isDragging) {
        const pct = parseFloat(progressKnob.style.left) || 0;
        const newTime = (pct / 100) * player.getDuration();
        player.seekTo(newTime, true);
        isDragging = false;
        startHideTimer();
      }
    });
    function handleScrub(e) {
      e.stopPropagation();
      resetHideTimer();
      const rect = progressContainer.getBoundingClientRect();
      const touchX = e.touches ? e.touches[0].clientX : e.clientX;
      const offsetX = touchX - rect.left;
      let pct = (offsetX / rect.width) * 100;
      pct = Math.max(0, Math.min(100, pct));
      setBarPosition(pct);
    }

    window.changeVideo = function(id, title, element) {
      if (window.event) window.event.stopPropagation();
      player.loadVideoById(id);
      displayTitle.innerText = title;
      document.querySelectorAll('#playerCarousel .thumb-card').forEach(c => c.classList.remove('active'));
      if (element) element.classList.add('active');
      player.playVideo();
      hideUI();
      setTimeout(() => {
        element?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, 100);
    };

    // Lazy carousel: load next batch when scrolling near end
    function loadMoreCarousel() {
      if (carouselAllLoaded || !masterVideoIds.length) return;
      const end = Math.min(carouselStart + CAROUSEL_BATCH, masterVideoIds.length);
      for (let i = carouselStart; i < end; i++) {
        const id = masterVideoIds[i];
        const title = `Video ${i + 1}`;
        const card = document.createElement('div');
        card.className = 'thumb-card' + (id === currentActiveId ? ' active' : '');
        const img = document.createElement('img');
        img.dataset.id = id;
        img.alt = title;
        card.appendChild(img);
        card.addEventListener('click', (e) => {
          e.stopPropagation();
          changeVideo(id, title, card);
        });
        carousel.appendChild(card);
        carouselImageObserver.observe(img);
      }
      carouselStart = end;
      if (carouselStart >= masterVideoIds.length) carouselAllLoaded = true;
    }

    function onCarouselScroll() {
      if (carouselAllLoaded) return;
      const { scrollLeft, scrollWidth, clientWidth } = carousel;
      if (scrollLeft + clientWidth >= scrollWidth - 300) {
        loadMoreCarousel();
      }
    }

    // Asynchronously load carousel until the active video appears (non‑blocking)
    function ensureActiveVideoInCarousel(activeId) {
      if (!activeId) return;
      let attempts = 0;
      const maxAttempts = 100; // safety
      const checkAndLoad = () => {
        attempts++;
        const card = getCarouselCardByVideoId(activeId);
        if (card) {
          // Found – ensure it's active and scroll to it
          setActiveCarouselItem(activeId);
          setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }), 100);
          return;
        }
        if (!carouselAllLoaded && attempts < maxAttempts) {
          loadMoreCarousel(); // load next batch
          setTimeout(checkAndLoad, 40); // check again after a short delay
        } else {
          // All loaded but still not found (shouldn't happen)
          console.warn('Active video not found in carousel after full load');
        }
      };
      checkAndLoad();
    }

    function setActiveCarouselItem(id) {
      document.querySelectorAll('#playerCarousel .thumb-card').forEach(c => c.classList.remove('active'));
      const card = getCarouselCardByVideoId(id);
      if (card) card.classList.add('active');
    }

    function getCarouselCardByVideoId(id) {
      return Array.from(document.querySelectorAll('#playerCarousel .thumb-card')).find(card => {
        const img = card.querySelector('img');
        return img && img.dataset.id === id;
      });
    }

    function populateCarousel(activeId) {
      // Build master video IDs if not already built
      if (masterVideoIds.length === 0) {
        const seen = new Set();
        const allRaw = [
          ...homeLinks, ...trendingLinks, ...quranLinks,
          ...meccaMedinaLinks, ...shaarawyLinks
        ];
        allRaw.forEach(url => {
          const id = getVideoId(url);
          if (id && !seen.has(id)) {
            seen.add(id);
            masterVideoIds.push(id);
          }
        });
      }

      // Reset carousel
      carousel.innerHTML = '';
      carouselStart = 0;
      carouselAllLoaded = false;
      currentActiveId = activeId;

      // Load first batch
      loadMoreCarousel();

      // Attach scroll listener for lazy loading
      carousel.removeEventListener('scroll', onCarouselScroll);
      carousel.addEventListener('scroll', onCarouselScroll, { passive: true });

      // Also reset hide timer on carousel interaction
      carousel.addEventListener('scroll', resetHideTimer, { passive: true });
      carousel.addEventListener('touchstart', resetHideTimer, { passive: true });
      carousel.addEventListener('touchmove', resetHideTimer, { passive: true });
      carousel.addEventListener('touchend', resetHideTimer, { passive: true });

      // Ensure the active video appears (asynchronous, non‑blocking)
      ensureActiveVideoInCarousel(activeId);
    }

    window.openPlayerWithVideo = function(videoId, videoTitle) {
      playerContainer.style.display = 'block';
      document.querySelector('.app').style.display = 'none';

      if (player && player.loadVideoById) {
        player.loadVideoById(videoId);
        displayTitle.innerText = videoTitle;
        populateCarousel(videoId);
        player.playVideo();
        hideUI();
      } else {
        const checkExist = setInterval(() => {
          if (player && player.loadVideoById) {
            clearInterval(checkExist);
            player.loadVideoById(videoId);
            displayTitle.innerText = videoTitle;
            populateCarousel(videoId);
            player.playVideo();
            hideUI();
          }
        }, 100);
        // Safety timeout
        setTimeout(() => clearInterval(checkExist), 10000);
      }
    };

    window.closePlayer = function() {
      if (player && player.pauseVideo) player.pauseVideo();
      playerContainer.style.display = 'none';
      document.querySelector('.app').style.display = 'flex';
    };

    // ---------- TAB BUTTONS ----------
    document.querySelectorAll('.btn-home').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        resetGrid(homeLinks);
      });
    });

    document.querySelectorAll('.btn-mecca').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        resetGrid(meccaMedinaLinks);
      });
    });

    document.querySelectorAll('.btn-shaarawy').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        resetGrid(shaarawyLinks);
      });
    });

    document.querySelector('.btn-all')?.addEventListener('click', (e) => {
      e.preventDefault();
      const allRaw = [
        ...homeLinks, ...trendingLinks, ...quranLinks,
        ...meccaMedinaLinks, ...shaarawyLinks
      ];
      resetGrid(allRaw);
    });

    // ---------- INITIAL LOAD ----------
    window.addEventListener('load', function() {
      resetGrid(homeLinks);
    });

    // Also attach click to the two static video items
    document.querySelectorAll('.video__item[data-video-id]').forEach(item => {
      item.addEventListener('click', function(e) {
        const videoId = this.dataset.videoId;
        const videoTitle = this.dataset.videoTitle;
        openPlayerWithVideo(videoId, videoTitle);
      });
    });
  })();
  </script>
</body>
</html>
